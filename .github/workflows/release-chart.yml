name: Release Helm Chart

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          mkdir -p .chart-release
          helm package charts/example-helm-01 -d .chart-release

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-branch

      - name: Update repo index
        run: |
          cp .chart-release/*.tgz gh-pages-branch/
          helm repo index gh-pages-branch --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

      - name: Push to gh-pages
        run: |
          cd gh-pages-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Release chart $(date -u +%Y%m%d%H%M%S)" || echo "No changes"
          git push
